<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神龙工作台 — LEXUN</title>
<style>
/* ============================================================
   CREATIVE STUDIO DESIGN SYSTEM
   ============================================================ */
:root {
  --bg:#F5F5F5; --surface:#FFF; --surface2:#F0F0F0;
  --text:#1A1A1A; --text2:#6B6B6B; --text3:#9E9E9E;
  --border:#E0E0E0; --border2:#CCC;
  --sidebar:#1C1C1E;
  --peugeot:#003DA5; --citroen:#C4411E; --gold:#C4A44A; --green:#2E7D32;
  --font:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  --t:.2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* SPLASH */
.splash{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .6s ease,transform .6s ease}
.splash.hide{opacity:0;transform:scale(1.05);visibility:hidden;pointer-events:none}
.splash-inner{text-align:center;transition:transform .5s ease,opacity .5s ease}
.splash.hide .splash-inner{transform:translateY(-20px);opacity:0}
.splash-line{width:1px;height:60px;background:var(--text);margin:0 auto 28px;animation:sLine .8s ease forwards}
.splash h1{font-size:clamp(40px,7vw,72px);font-weight:900;letter-spacing:.12em;opacity:0;animation:sFade .7s .3s ease forwards}
.splash .sub{font-size:12px;color:var(--text3);letter-spacing:.3em;margin-top:14px;opacity:0;animation:sFade .7s .6s ease forwards}
.splash .hint{font-size:10px;color:var(--text3);margin-top:40px;opacity:0;animation:sArrow 1s 1s ease infinite}
@keyframes sLine{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes sFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sArrow{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(4px)}}

/* ============================================================
   APP SHELL — Text sidebar
   ============================================================ */
.app{min-height:100vh;opacity:0;filter:blur(6px);transition:opacity .6s ease,filter .6s ease}
.app.ready{opacity:1;filter:blur(0)}
.header{position:sticky;top:0;z-index:100;background:rgba(245,245,245,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:50px;display:flex;align-items:center;gap:28px}
.header-brand{display:flex;align-items:baseline;gap:8px;white-space:nowrap}
.header-brand b{font-size:14px;font-weight:800}
.header-brand span{font-size:9px;color:var(--text3);letter-spacing:.1em}
.header-nav{display:flex;gap:0;height:100%;flex:1}
.header-nav button{height:100%;padding:0 12px;border:none;border-bottom:2px solid transparent;background:none;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--font);transition:var(--t);white-space:nowrap}
.header-nav button:hover{color:var(--text)}
.header-nav button.active{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.header-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.header-actions button{font-size:10px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;font-family:var(--font);color:var(--text2);transition:var(--t)}
.header-actions button:hover{color:var(--text);border-color:var(--text)}
.header-actions .hdr-ai{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:600;padding:4px 12px}
.hdr-lvl{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--surface2);cursor:pointer;border:1px solid var(--border)}

/* ============================================================
   MAIN — Full width canvas
   ============================================================ */
.main{padding:32px 36px;overflow:visible}
.main-inner{width:100%}
@media(max-width:768px){.main{padding:20px 16px}}
.tab-content{display:none}
.tab-content.active{display:block;animation:in .25s ease}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ======== HERO — Big watermark date + offset greeting ======== */
.hero-section{position:relative;margin-bottom:40px}
.hero-watermark{font-size:clamp(100px,12vw,160px);font-weight:900;line-height:1;color:#E8E8E8;letter-spacing:-.04em;user-select:none;margin-left:-4px}
.hero-greeting{margin-top:-32px;margin-left:clamp(60px,10vw,120px);position:relative;z-index:1}
.hero-greeting h3{font-size:clamp(28px,4vw,42px);font-weight:800;letter-spacing:-.02em}
.hero-greeting p{font-size:15px;color:var(--text2);margin-top:4px}
.hero-prefix{position:absolute;right:0;top:10px;background:var(--text);color:var(--bg);padding:6px 16px;font-size:10px;letter-spacing:.1em;transform:rotate(2deg)}

/* ======== IRREGULAR STATS ======== */
.stat-cluster{display:flex;gap:12px;margin-bottom:32px;align-items:flex-start;flex-wrap:wrap}
.stat-big{background:var(--surface);border:3px solid var(--text);padding:28px 36px;text-align:center}
.stat-big .val{font-size:56px;font-weight:900;line-height:1}
.stat-big .lbl{font-size:12px;color:var(--text2);margin-top:6px;letter-spacing:.05em}
.stat-sm{background:var(--surface2);padding:18px 24px;text-align:center;transform:rotate(-1deg)}
.stat-sm .val{font-size:28px;font-weight:800}
.stat-sm .lbl{font-size:11px;color:var(--text3);margin-top:3px}
.stat-tiny{background:var(--surface);border:1px solid var(--border);padding:10px 14px;font-size:11px;text-align:center;margin-top:12px}

/* ======== ASYMMETRIC CARDS ======== */
.asym-row{display:flex;gap:12px;margin-bottom:32px;align-items:flex-start}
.asym-wide{flex:3;display:flex;flex-direction:column;gap:12px}
.asym-narrow{flex:2;display:flex;flex-direction:column;gap:12px;margin-top:20px}
.card-lg{background:var(--surface);border:2px solid var(--text);padding:32px;position:relative}
.card-lg .c-label{font-size:10px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}
.card-lg h4{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.card-lg p{font-size:14px;color:var(--text2);line-height:1.7}
.card-lg .corner{position:absolute;top:-10px;right:20px;background:var(--text);color:var(--bg);padding:4px 14px;font-size:9px;letter-spacing:.1em;transform:rotate(1deg)}
.card-md{background:var(--surface);border:1px solid var(--border);padding:18px;margin-left:-12px;box-shadow:3px 3px 0 var(--text)}
.card-md h4{font-size:14px;font-weight:700}
.card-offset{background:var(--surface);border:1px solid var(--border);padding:16px;margin-right:-16px;transform:rotate(.5deg)}

/* ======== BLEEDING IMAGE SECTION ======== */
.bleed-row{display:flex;gap:0;margin:36px -36px;align-items:stretch;position:relative}
@media(max-width:768px){.bleed-row{flex-direction:column;margin:28px -16px}}
.bleed-img{flex:1;min-height:220px;background:linear-gradient(135deg,#D0D0D0,#A0A0A0);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bleed-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.bleed-img .placeholder{font-size:13px;color:#FFF;letter-spacing:.1em;z-index:0}
.bleed-text{flex:1;background:var(--text);color:var(--bg);padding:36px;display:flex;flex-direction:column;justify-content:center}
.bleed-text h4{font-size:32px;font-weight:900;margin-bottom:8px}
.bleed-text p{font-size:14px;color:#A0A0A0;line-height:1.7}
.bleed-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:var(--surface);border:2px solid var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:20;transition:var(--t)}
.bleed-nav:hover{background:var(--text);color:var(--bg)}
.bleed-prev{left:8px}.bleed-next{right:8px}
.bleed-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.bleed-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:var(--t)}
.bleed-dots span.active{background:#FFF}

/* ======== DARK BREAK ======== */
.dark-break{margin:36px -36px;background:var(--text);padding:40px 56px;color:var(--bg);display:flex;gap:32px;align-items:center}
@media(max-width:768px){.dark-break{flex-direction:column;margin:28px -16px;padding:28px 24px}}
.dark-break h3{font-size:24px;font-weight:900;letter-spacing:-.02em;margin-bottom:6px}
.dark-break p{font-size:12px;color:#8A8A8A;line-height:1.7}

/* ======== TAG CLOUD ======== */
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;justify-content:center}
.tag-cloud .t-bold{padding:6px 16px;font-size:12px;cursor:pointer;border:2px solid var(--text);background:var(--surface);font-weight:700;transform:rotate(-1deg)}
.tag-cloud .t-light{padding:6px 14px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);transform:rotate(.5deg)}
.tag-cloud .t-dark{padding:6px 16px;font-size:12px;cursor:pointer;background:var(--text);color:var(--bg)}
.tag-cloud .t-up{padding:5px 12px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);margin-top:-6px}
.tag-cloud span:hover{transform:scale(1.06) rotate(0deg)!important;box-shadow:2px 2px 0 var(--text);z-index:1;position:relative}

/* ======== BRAND PAGE ======== */
.brand-toggle-row{display:flex;border:1px solid var(--border);width:fit-content;margin-bottom:24px}
.brand-toggle-row button{padding:8px 18px;border:none;background:var(--surface);font-size:13px;cursor:pointer;font-family:var(--font);color:var(--text2)}
.brand-toggle-row button.active{background:var(--text);color:var(--bg);font-weight:600}
.model-card{background:var(--surface);margin-bottom:8px;overflow:hidden}
.model-card.open{border:2px solid var(--text)}
.model-card-header{display:grid;grid-template-columns:200px 1fr auto;gap:20px;padding:20px;cursor:pointer;align-items:center}
@media(max-width:860px){.model-card-header{grid-template-columns:1fr}}
.model-card-img{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--surface2)}
.model-card-info h4{font-size:17px;font-weight:800}
.model-card-info .pos{font-size:11px;color:var(--text2);margin-top:2px}
.model-card-body-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.model-card.open .model-card-body-wrap{grid-template-rows:1fr}
.model-card-body-inner{overflow:hidden}
.model-card-body-inner>div{padding:0 20px 20px;border-top:1px solid var(--border)}
.sp-grid{display:grid;grid-template-columns:1fr 1.2fr auto;gap:12px;padding-top:16px}
@media(max-width:860px){.sp-grid{grid-template-columns:1fr}}
.sp-cat h5{font-size:13px;font-weight:700;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--border);grid-column:1/-1}
.sp-item{margin-bottom:10px}
.sp-item .name{font-weight:700;font-size:11px;margin-bottom:2px}
.sp-item .detail{font-size:10px;color:var(--text2);line-height:1.6}
.sp-item .ugc{font-size:10px;color:var(--text2);line-height:1.6;padding:6px 10px;background:var(--surface2);border-left:2px solid var(--border2)}

/* ======== EVENTS, CARDS, TOOLS ======== */
.card{background:var(--surface);padding:22px;margin-bottom:8px}
.card:hover{box-shadow:2px 2px 0 var(--text)}
.card h4{font-size:14px;font-weight:700;margin-bottom:10px}
.timeline{position:relative}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:1px;background:var(--border2)}
.timeline-step{position:relative;padding-left:28px;margin-bottom:14px}
.timeline-step .dot{position:absolute;left:0;top:2px;width:20px;height:20px;border:2px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;background:var(--surface)}
.timeline-step.done .dot{background:var(--text);color:var(--bg);border-color:var(--text)}
.step-card{border:1px solid var(--border);background:var(--surface);margin-bottom:8px}
.step-card:hover{border-color:var(--text)}
.step-card-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.step-card-head h4{font-size:13px;font-weight:700}
.step-card-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border);animation:in .2s ease}
.step-card.open .step-card-body{display:block}
.event-progress{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.ep-step{flex:1;min-width:70px;padding:8px 6px;border:1px solid var(--border);text-align:center;cursor:pointer;font-size:9px;color:var(--text2);background:var(--surface)}
.ep-step:hover{border-color:var(--text)}
.ep-step.done{background:var(--text);color:var(--bg);border-color:var(--text)}
.ep-step .ep-num{font-size:14px;font-weight:800;display:block}
.tools-list{display:flex;flex-direction:column;gap:8px}
.tool-row{display:grid;grid-template-columns:160px 1fr;gap:18px;padding:18px 22px;background:var(--surface);border:1px solid var(--border)}
.tool-row:hover{border-color:var(--text)}
@media(max-width:768px){.tool-row{grid-template-columns:1fr}}
.subnav{display:flex;border:1px solid var(--border);width:fit-content;margin-bottom:20px}
.subnav button{padding:6px 14px;border:none;background:var(--surface);font-size:11px;cursor:pointer;font-family:var(--font);color:var(--text2)}
.subnav button.active{background:var(--text);color:var(--bg);font-weight:600}

/* ======== BUTTONS & TAGS ======== */
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;font-size:11px;font-family:var(--font);cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);white-space:nowrap;transition:var(--t)}
.btn:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-sm{padding:4px 9px;font-size:10px}
.btn-xs{padding:2px 5px;font-size:9px}
.btn-dark{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-dark:hover{opacity:.85}
.keyword-tag{display:inline-flex;padding:3px 10px;border:1px solid var(--border);font-size:10px;color:var(--text2);cursor:pointer}
.keyword-tag:hover{color:var(--text);border-color:var(--text);background:var(--surface2)}
.keyword-tag.p{color:var(--peugeot);border-color:#D0D8F0;background:#F5F7FC}
.keyword-tag.c{color:var(--citroen);border-color:#F0D4CC;background:#FCF7F5}

/* ======== ADVENTURE PANEL ======== */
.adv-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.adv-overlay.show{opacity:1;pointer-events:auto}
.adv-panel{width:680px;max-width:94vw;max-height:85vh;background:var(--surface);overflow-y:auto;border:3px solid var(--text);animation:in .25s ease}
.adv-head{background:var(--text);color:var(--bg);padding:28px 32px;display:flex;align-items:center;gap:20px}
.adv-head .lvl-badge{width:56px;height:56px;border:3px solid var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;flex-shrink:0}
.adv-head h3{font-size:22px;font-weight:900}
.adv-head p{font-size:11px;color:#A0A0A0;margin-top:2px}
.adv-xp-bar{margin:0 32px;padding:16px 0;border-bottom:1px solid var(--border)}
.adv-xp-bar .xp-track{height:8px;background:var(--surface2);position:relative;margin-top:6px}
.adv-xp-bar .xp-fill{height:100%;background:var(--text);transition:width .5s ease}
.adv-section{padding:20px 32px;border-bottom:1px solid var(--border)}
.adv-section h4{font-size:14px;font-weight:800;margin-bottom:12px}
.prefix-grid{display:flex;flex-wrap:wrap;gap:6px}
.prefix-option{padding:6px 14px;border:1px solid var(--border);font-size:11px;cursor:pointer;transition:var(--t)}
.prefix-option:hover{border-color:var(--text)}
.prefix-option.equipped{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:700}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.ach-item{text-align:center;padding:14px 8px;border:1px solid var(--border)}
.ach-item.unlocked{background:var(--surface)}
.ach-item.locked{opacity:.3;filter:grayscale(1)}
.ach-item .ach-icon{font-size:22px;display:block;margin-bottom:4px}
.ach-item .ach-name{font-size:9px;font-weight:600}
.ach-item .ach-date{font-size:8px;color:var(--text3)}
.activity-log{font-size:10px;color:var(--text2);line-height:2}
.activity-log span{color:var(--text3);margin-right:8px}

/* ======== AI, SETTINGS, EDITOR ======== */
.ai-overlay{position:fixed;inset:0;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.ai-overlay.show{opacity:1;pointer-events:auto}
.ai-bg{position:absolute;inset:0;background:rgba(0,0,0,.2)}
.ai-panel{position:absolute;right:0;top:0;bottom:0;width:420px;max-width:92vw;background:var(--surface);display:flex;flex-direction:column;border-left:2px solid var(--text);animation:in .25s ease}
.ai-panel-head{padding:18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ai-ctx{font-size:9px;color:var(--text3);padding:5px 18px;background:var(--surface2)}
.ai-messages{flex:1;overflow-y:auto;padding:14px}
.ai-msg{padding:10px 14px;margin-bottom:6px;font-size:11px;line-height:1.7;max-width:94%}
.ai-msg.user{background:var(--surface2);margin-left:auto}
.ai-msg.assistant{border:1px solid var(--border)}
.ai-input-row{display:flex;gap:6px;padding:14px 18px;border-top:1px solid var(--border)}
.ai-input-row textarea{flex:1;border:1px solid var(--border);padding:8px 10px;font-size:11px;font-family:var(--font);resize:none;outline:none;background:var(--surface2);min-height:38px;max-height:70px}
.ai-input-row button{padding:0 14px;border:2px solid var(--text);background:var(--text);color:var(--bg);cursor:pointer;font-weight:700;font-size:11px}
.ai-quick-actions{display:flex;gap:4px;padding:6px 18px;flex-wrap:wrap}
.ai-quick-actions button{padding:3px 9px;border:1px solid var(--border);background:transparent;font-size:9px;color:var(--text2);cursor:pointer}
.settings-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.settings-overlay.show{opacity:1;pointer-events:auto}
.settings-bg{position:absolute;inset:0;background:rgba(0,0,0,.2)}
.settings-box{position:relative;width:380px;background:var(--surface);padding:28px;border:2px solid var(--text);animation:in .25s ease}
.ed-overlay{position:fixed;inset:0;z-index:180;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.ed-overlay.show{opacity:1;pointer-events:auto}
.ed-panel{width:840px;max-width:95vw;max-height:85vh;background:var(--surface);display:flex;flex-direction:column;border:2px solid var(--text);overflow:hidden;animation:in .25s ease}
.ed-toolbar{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border)}
.ed-body{display:flex;flex:1;overflow:hidden}
.ed-main{flex:1;padding:16px;overflow-y:auto}
.ed-main textarea{width:100%;min-height:360px;border:none;font-size:14px;font-family:var(--font);line-height:1.8;resize:vertical;background:transparent;color:var(--text);outline:none}
.ed-sidebar{width:170px;border-left:1px solid var(--border);padding:12px;overflow-y:auto;font-size:9px}
.ed-stats{display:flex;gap:14px;font-size:9px;color:var(--text3);padding:10px 16px;border-top:1px solid var(--border)}

/* ======== CALENDAR ======== */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
.cal-cell{aspect-ratio:1;padding:3px;font-size:8px;background:var(--surface);cursor:pointer}
.cal-cell:hover{background:var(--surface2)}
.cal-cell .node{font-size:6px;padding:1px 3px;border-radius:2px;margin-top:1px;overflow:hidden;white-space:nowrap}
.cal-cell .node.holiday{background:#FDE8E8;color:#B8381B}.cal-cell .node.marketing{background:#FEF0E0;color:#C46A20}.cal-cell .node.custom{background:var(--surface2)}
.cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--text)}
.cal-popup{position:fixed;z-index:500;background:var(--surface);border:2px solid var(--text);padding:16px;width:220px;display:none;box-shadow:4px 4px 0 rgba(0,0,0,.1)}
.cal-popup.show{display:block}
.cal-popup input,.cal-popup select{width:100%;padding:5px 8px;border:1px solid var(--border);font-size:10px;margin-bottom:4px;outline:none}

/* ======== MISC ======== */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.toast{padding:8px 16px;background:var(--text);color:var(--bg);font-size:10px;animation:tIn .2s ease}
@keyframes tIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.todo-item{display:flex;align-items:center;gap:6px;padding:5px 0;font-size:11px;cursor:pointer}
.todo-item.done{text-decoration:line-through;color:var(--text3)}
.todo-item .todo-check{width:13px;height:13px;border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px}
.todo-item.done .todo-check{background:var(--text);color:var(--bg);border-color:var(--text)}
.ai-loading{display:flex;align-items:center;gap:4px;padding:8px 0;font-size:10px;font-style:italic;color:var(--text2)}
.ai-loading .dot{width:3px;height:3px;border-radius:50%;background:var(--text);animation:dotP .9s ease infinite}
.ai-loading .dot:nth-child(2){animation-delay:.15s}.ai-loading .dot:nth-child(3){animation-delay:.3s}
@keyframes dotP{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes xpGain{0%{transform:scale(1);color:var(--gold)}100%{transform:scale(1);color:inherit}}
.empty-state{text-align:center;padding:24px 0;color:var(--text3);font-size:10px;font-style:italic}
.fwd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.fwd-card{padding:18px;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:11px;line-height:2;position:relative}
.fwd-card:hover{border-color:var(--text)}
.fwd-card .fcp{position:absolute;top:6px;right:6px;opacity:0}
.fwd-card:hover .fcp{opacity:1}
.word-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.word-col{background:var(--surface);padding:18px}
.word-ch{font-size:14px;font-weight:800;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--text)}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.type-card{padding:14px;background:var(--surface);border:1px solid var(--border);cursor:pointer;text-align:center}
.type-card.selected{border:2px solid var(--text)}
</style>

'<div class="tool-row"><div class="tool-head"><h4 style="font-size:13px;font-weight:800">预发布清单</h4></div><div class="tool-body"><div style="display:flex;flex-direction:column;gap:4px;font-size:10px"><label><input type="checkbox"> 文字≥100字</label><label><input type="checkbox"> 图片≥3张</label><label><input type="checkbox"> 话题已添加</label><label><input type="checkbox"> 无AI词汇</label><label><input type="checkbox"> CTA已添加</label></div></div></div></div>'}
function doSwap(from){var inp=document.getElementById('swapInput'),txt=inp.value;if(!txt.trim()){toast('请先粘贴');return}var res=txt;Object.keys(BRAND_SWAP).forEach(function(k){res=res.replace(new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<mark>'+BRAND_SWAP[k]+'</mark>')});document.getElementById('swapResult').innerHTML='<div style="background:var(--surface2);padding:8px;font-size:10px;line-height:1.8">'+res+'</div><button class="btn btn-xs btn-dark" style="margin-top:4px" onclick="var t=document.getElementById(\'swapInput\').value;Object.keys(BRAND_SWAP).forEach(function(k){t=t.replace(new RegExp(k.replace(/[.*+?^${}()|[\\]\\\\]/g,\'\\\\\\\\$&\'),\'g\'),BRAND_SWAP[k])});copy(t)">复制</button>'}
function runCalc(){var a=(parseInt(document.getElementById('calcApp').value)||0)*100,as=(parseInt(document.getElementById('calcAppS').value)||0)*600,s=(parseInt(document.getElementById('calcSocial').value)||0)*100,c=(parseInt(document.getElementById('calcCustP').value)||0)*(parseInt(document.getElementById('calcCustQ').value)||0);document.getElementById('calcTotal').textContent=(a+as+s+c).toLocaleString()}

// ============================================================

function openAdventure(){var o=document.getElementById('advOverlay');o.classList.add('show');renderAdventure()}
function closeAdv(){document.getElementById('advOverlay').classList.remove('show')}
document.getElementById('advOverlay').addEventListener('click',function(e){if(e.target===this)closeAdv()});
function renderAdventure(){
  var lvl=currentLevel(),xp=currentXP(),xpn=xpToNext(),pct=Math.round(xp/xpn*100),pfx=getPrefixName(equippedPrefix);
  var h='<div class="adv-head"><div class="lvl-badge">'+lvl+'</div><div><h3>'+(pfx?pfx+' · ':'')+'LEXUN</h3><p>⭐ Lv.'+lvl+' · 成就 '+Object.keys(ACHIEVEMENTS).length+' 个</p></div></div>'+
  '<div class="adv-xp-bar"><div style="display:flex;justify-content:space-between;font-size:10px"><span>'+xp+' / '+xpn+' XP</span><span>距 Lv.'+(lvl+1)+' 还需 '+(xpn-xp)+' XP</span></div><div class="xp-track"><div class="xp-fill" style="width:'+pct+'%"></div></div></div>'+
  '<div class="adv-section"><h4>装备前缀</h4><div class="prefix-grid">'+PREFIXES.map(function(p){var has=p.ach?ACHIEVEMENTS[p.ach]:true;return'<div class="prefix-option'+(equippedPrefix===p.id?' equipped':'')+(has?'':' locked')+'"'+(has?' onclick="equipPrefix(\''+p.id+'\')"':'')+'>'+(has?p.n:'???')+(equippedPrefix===p.id?' ✓':'')+'</div>'}).join('')+'</div></div>'+
  '<div class="adv-section"><h4>成就墙 ('+Object.keys(ACHIEVEMENTS).length+'/'+PREFIXES.length+')</h4><div class="ach-grid">'+PREFIXES.map(function(p){var u=ACHIEVEMENTS[p.ach];return'<div class="ach-item'+(u?' unlocked':' locked')+'"><span class="ach-icon">'+(u?'🏆':'🔒')+'</span><span class="ach-name">'+p.n+'</span>'+(u?'<span class="ach-date">'+u+'</span>':'')+'</div>'}).join('')+'</div></div>'+
  '<div class="adv-section"><h4>近期动态</h4><div class="activity-log">'+XP_LOG.slice(-20).reverse().map(function(e){return'<div><span>'+e.time+'</span>'+e.reason+' +'+e.xp+' XP</div>'}).join('')+'</div></div>';
  document.getElementById('advContent').innerHTML=h;
}
function equipPrefix(pid){equippedPrefix=pid;localStorage.setItem('sl_prefix',pid);renderAdventure();toast('前缀已装备：'+getPrefixName(pid))}

// ============================================================
// EDITOR with slash lookup
// ============================================================
function openEditor(title,brand,model){document.getElementById('editorOverlay').classList.add('show');document.getElementById('editorTitle').textContent=title||'编辑器';document.getElementById('editorTextarea').value='';renderEditorSidebar(brand,model);document.getElementById('editorTextarea').focus();updateEditorStats()}
function closeEditor(){document.getElementById('editorOverlay').classList.remove('show')}
function renderEditorSidebar(brand,model){var sps='',kws='';if(brand&&model){var b=BRANDS[brand],m=b.models.find(function(m){return m.model===model});if(m){m.cats.forEach(function(c){c.items.forEach(function(sp){sps+='<div class="chip" style="padding:3px 6px;border:1px solid var(--border);cursor:pointer;font-size:9px;margin-bottom:2px" onclick="insertAtCursor(\''+sp.official.replace(/'/g,"\\'")+'\')">'+sp.name+'</div>'})});b.keywords.forEach(function(k){kws+='<div class="chip" style="padding:3px 6px;border:1px solid var(--border);cursor:pointer;font-size:9px;margin-bottom:2px" onclick="insertAtCursor(\''+k+'\')">'+k+'</div>'})}}document.getElementById('editorSPs').innerHTML=sps||'<span style="font-size:9px;color:var(--text3)">打开车型编辑器</span>';document.getElementById('editorKeywords').innerHTML=kws}
function insertAtCursor(t){var ta=document.getElementById('editorTextarea'),s=ta.selectionStart,e=ta.selectionEnd;ta.value=ta.value.substring(0,s)+t+ta.value.substring(e);ta.selectionStart=ta.selectionEnd=s+t.length;ta.focus();updateEditorStats()}
function insertFromRef(){var side=document.getElementById('editorSidebar'),chips=side.querySelectorAll('.chip');if(chips.length)chips[0].click()}
function saveDraft(){var ta=document.getElementById('editorTextarea'),txt=ta.value.trim();if(!txt){toast('内容为空');return}drafts.unshift({title:document.getElementById('editorTitle').textContent,content:txt,time:new Date().toLocaleString()});S('drafts',drafts);toast('草稿已保存');addXP(5,'保存草稿')}
function openDraft(i){var d=drafts[i];if(!d)return;openEditor(d.title);document.getElementById('editorTextarea').value=d.content;updateEditorStats()}
function copyEditorContent(){var t=document.getElementById('editorTextarea').value;if(!t.trim()){toast('内容为空');return}copy(t)}
function updateEditorStats(){var ta=document.getElementById('editorTextarea');if(!ta)return;var t=ta.value;document.getElementById('editorCharCount').textContent=t.length;var flags=['总而言之','众所周知','不可否认','赋能','抓手','闭环'];document.getElementById('editorAIWarning').style.display=flags.some(function(f){return t.includes(f)})?'inline':'none'}
// Slash lookup
var slashTimeout;document.getElementById('editorTextarea').addEventListener('input',function(e){updateEditorStats();var ta=e.target,v=ta.value,cp=ta.selectionStart,lastSlash=v.lastIndexOf('/',cp-1);if(lastSlash>-1&&(lastSlash===0||v[lastSlash-1]===' '||v[lastSlash-1]==='\n')){var q=v.substring(lastSlash+1,cp).toLowerCase();clearTimeout(slashTimeout);slashTimeout=setTimeout(function(){doSlashLookup(q,ta,lastSlash)},200)}});
function doSlashLookup(q,ta,pos){if(q.length<1)return;var results=[];Object.values(BRANDS).forEach(function(b){b.models.forEach(function(m){if(m.model.toLowerCase().includes(q)||m.pos.includes(q))results.push({l:m.model+' '+m.pos,sp:m});m.cats.forEach(function(c){c.items.forEach(function(sp){if(sp.name.includes(q))results.push({l:sp.name,t:sp.official})})})})});
if(results.length){showSlashDropdown(results.slice(0,6),ta,pos)}else{closeSlashDropdown()}}
function showSlashDropdown(items,ta,pos){closeSlashDropdown();var d=document.createElement('div');d.id='slashDrop';d.style.cssText='position:fixed;background:var(--surface);border:2px solid var(--text);padding:4px;z-index:500;max-width:280px;font-size:11px';items.forEach(function(item){var opt=document.createElement('div');opt.style.cssText='padding:6px 10px;cursor:pointer';opt.textContent='/ '+item.l;opt.onclick=function(){var v=ta.value,before=v.lastIndexOf('/',pos);ta.value=v.substring(0,before)+(item.t||item.l)+' '+v.substring(ta.selectionStart);closeSlashDropdown();ta.focus();updateEditorStats()};d.appendChild(opt)});document.body.appendChild(d);var rect=ta.getBoundingClientRect();d.style.top=Math.min(rect.bottom+4,window.innerHeight-200)+'px';d.style.left=rect.left+'px'}
function closeSlashDropdown(){var el=document.getElementById('slashDrop');if(el)el.remove()}
document.getElementById('editorOverlay').addEventListener('click',function(e){if(e.target===this)closeEditor()});
document.getElementById('editorTextarea').addEventListener('input',updateEditorStats);

function exportDoc(){
  var t=document.getElementById('editorTextarea').value;if(!t.trim()){toast('请先输入内容');return}
  var html='<html><head><meta charset="UTF-8"><style>body{font-family:SimSun,serif;font-size:14px;line-height:2;padding:40px}h1{font-size:20px;border-bottom:2px solid #000;padding-bottom:8px}p{margin:8px 0}</style></head><body>'+t.replace(/\n/g,'<p>')+'</body></html>';
  var blob=new Blob([html],{type:'application/msword'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(document.getElementById('editorTitle').textContent||'文档')+'.doc';a.click();toast('已导出 Word');addXP(20,'导出文件')}
function exportExcel(data,filename){
  var csv='﻿'+data.map(function(r){return r.join(',')}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(filename||'表格')+'.csv';a.click();toast('已导出 Excel');addXP(20,'导出文件')
}

function exportEventList(){var data=[['步骤','品牌','完成状态']];EVENT_STEPS.forEach(function(s){['标致','雪铁龙'].forEach(function(b){var id=s.id+(b==='标致'?'_p':'_c');data.push([s.title,b,eventChecklist[id]?'✓':''])});});exportExcel(data,'活动清单')}

function toggleSettings(){var o=document.getElementById('settingsOverlay');o.classList.toggle('show');if(o.classList.contains('show')){document.getElementById('settingsApiKey').value=getAPIKey();document.getElementById('settingsModel').value=localStorage.getItem('sl_model')||'deepseek-chat'}}
function saveSettings(){var key=document.getElementById('settingsApiKey').value.trim();if(key)localStorage.setItem('sl_apikey',key);localStorage.setItem('sl_model',document.getElementById('settingsModel').value);toggleSettings();toast('设置已保存')}
function getAPIKey(){return localStorage.getItem('sl_apikey')||''}

// ============================================================
// AI — DeepSeek (OpenAI format, streaming)
// ============================================================
function toggleAIPanel(){var o=document.getElementById('aiOverlay');o.classList.toggle('show');if(o.classList.contains('show')){updateAIContext();renderAIQuickActions();renderAIMessages();setTimeout(function(){document.getElementById('aiInput').focus()},200)}}
function renderAIMessages(){var el=document.getElementById('aiMessages');el.innerHTML=aiMessages.map(function(m){return'<div class="ai-msg '+m.role+'">'+m.text.replace(/\n/g,'<br>')+'</div>'}).join('');el.scrollTop=el.scrollHeight}
async function sendAIMessage(){
  if(aiLoading)return;var inp=document.getElementById('aiInput'),txt=inp.value.trim();if(!txt){toast('请输入内容');return}
  var key=getAPIKey();if(!key){toast('请先设置 DeepSeek API Key')}
  aiMessages.push({role:'user',text:txt});inp.value='';renderAIMessages();
  aiLoading=true;document.getElementById('aiSendBtn').disabled=true;
  var msgEl=document.createElement('div');msgEl.className='ai-msg assistant';msgEl.innerHTML='<div class="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div>思考中…</div>';
  document.getElementById('aiMessages').appendChild(msgEl);
  try{
    var resp=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:'你是神龙工作台AI助理，服务于东风标致和东风雪铁龙品牌。'},{role:'user',content:'【上下文：'+aiContext+'】'+txt}],max_tokens:2000,temperature:.7,stream:true})});
    if(!resp.ok){var err=await resp.json().catch(function(){return{}});throw new Error(err.error?.message||'请求失败')}
    var reader=resp.body.getReader(),decoder=new TextDecoder(),buf='',full='';msgEl.innerHTML='';
    while(true){var d=await reader.read();if(d.done)break;buf+=decoder.decode(d.value,{stream:true});var lines=buf.split('\n');buf=lines.pop()||'';
      for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(!l||!l.startsWith('data: '))continue;var data=l.slice(6);if(data==='[DONE]')continue;
        try{var p=JSON.parse(data);var delta=p.choices[0].delta;if(delta&&delta.content){full+=delta.content;msgEl.innerHTML=full.replace(/\n/g,'<br>')}}catch(e){}}}
    if(!full)full='（返回为空）';msgEl.innerHTML=full.replace(/\n/g,'<br>');aiMessages.push({role:'assistant',text:full});addXP(5,'AI辅助')
  }catch(e){msgEl.innerHTML='<span style="color:var(--citroen)">错误：'+e.message+'</span>'}
  aiLoading=false;document.getElementById('aiSendBtn').disabled=false;document.getElementById('aiMessages').scrollTop=document.getElementById('aiMessages').scrollHeight;
}
function aiQuick(p){document.getElementById('aiInput').value=p;if(!document.getElementById('aiOverlay').classList.contains('show'))toggleAIPanel();else sendAIMessage()}
async function aiGenCopy(type,car){if(!getAPIKey()){toast('请先设置 API Key');return}toggleAIPanel();document.getElementById('aiInput').value='帮我写一篇推文。'+type+(car?'，车型：'+car:'')+'。要求有标题、开头情感引入、正文分段、结尾CTA。';sendAIMessage()}
async function aiGenEvent(s){if(!getAPIKey()){toast('请先设置 API Key');return}var p={theme:'帮我策划一个车主共创活动主题',speech:'帮我写品牌领导在车主活动上的发言稿',script:'帮我写车主共创活动全流程主持台本',review:'帮我写一篇车主共创活动回顾推文'};toggleAIPanel();document.getElementById('aiInput').value=p[s]||'帮我生成活动内容';sendAIMessage()}
async function aiGenFwd(topic){if(!getAPIKey()){toast('请先设置 API Key');return}toggleAIPanel();document.getElementById('aiInput').value='帮我为「'+topic+'」生成3条社交媒体转发语，简洁有力，带emoji和话题标签';sendAIMessage()}
async function aiAssistEditor(){var t=document.getElementById('editorTextarea').value;if(!getAPIKey()){toast('请先设置 API Key');return}if(!t.trim()){toast('请先输入内容');return}toggleAIPanel();document.getElementById('aiInput').value='帮我润色以下文字：\n\n'+t;sendAIMessage()}
async function aiAssistAssembly(){if(!getAPIKey()){toast('请先设置 API Key');return}toggleAIPanel();var t=getAsmPreview();document.getElementById('aiInput').value='帮我用以下框架生成一篇推文：\n\n'+(t||'请先生成框架');sendAIMessage()}
